<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地図タイル表示テスト</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ★ GitHub Pages 用タイルURL（正しい書式）
        var tileUrl = "https://haku502007-lang.github.io/nisido/tiles/{z}/{x}/{y}.png";

        // 地図の初期位置（適当に日本の中心）
        var map = L.map('map').setView([35.0, 135.0], 12);

        // タイルレイヤー追加
        L.tileLayer(tileUrl, {
            maxZoom: 18,
            minZoom: 5,
            attribution: "Custom Tiles"
        }).addTo(map);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地図タイル表示テスト</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body { height: 100%; margin: 0; }
  #map { width: 100%; height: 100%; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// ★ Webメルカトル（EPSG:3857）タイル用の標準設定
const map = L.map('map', {
  center: [35.25, 137.0],  // 中部地方の中心（必要なら後で調整）
  zoom: 12,
  minZoom: 5,
  maxZoom: 18
});

// ★ GitHub Pages のタイルURL（絶対パス）
L.tileLayer('https://haku502007-lang.github.io/nisido/tiles/{z}/{x}/{y}.png', {
  minZoom: 5,
  maxZoom: 18,
  attribution: '© Your Tiles'
}).addTo(map);
</script>

</body>
</html>

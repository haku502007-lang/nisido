<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地図タイル表示テスト</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  #map {
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>
<div id="map"></div>

<script>
// ★ GitHub の tiles が 5〜18 なので、それに合わせる
const map = L.map('map', {
  center: [35.0, 135.0],  // 初期位置（必要なら変更OK）
  zoom: 10,
  minZoom: 5,
  maxZoom: 18
});

// ★ GitHub Pages の tiles パスに完全一致
L.tileLayer('./tiles/{z}/{x}/{y}.png', {
  minZoom: 5,
  maxZoom: 18,
  attribution: '© Your Tiles'
}).addTo(map);
</script>

</body>
</html>

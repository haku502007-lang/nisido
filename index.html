<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>地図タイル表示テスト</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet 読み込み -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body, html { margin: 0; padding: 0; height: 100%; }
  #map { width: 100%; height: 100%; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// 地図の初期位置（適当に日本の中心）
var map = L.map('map').setView([35.0, 135.0], 10);

// 晃一の GitHub Pages タイルURL
var tileUrl = "https://haku502007-lang.github.io/nisido/tiles/{z}/{x}/{y}.png";

// タイルレイヤー追加
L.tileLayer(tileUrl, {
    maxZoom: 18,
    minZoom: 10,
    attribution: "My QGIS Tiles"
}).addTo(map);
</script>

</body>
</html>
